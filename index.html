<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول / إنشاء حساب</title>

    <!-- ===== Supabase SDK ===== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #f0f4ff 0%, #e8edf8 100%);
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.4);
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #1e1b4b;
        }

        .logo span {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin: 4px 0 20px;
        }

        .tabs {
            display: flex;
            background: rgba(99, 102, 241, 0.06);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: #9ca3af;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #ffffff;
            color: #1e1b4b;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.12);
        }

        .form-container {
            display: none;
            animation: fadeUp 0.4s ease;
        }

        .form-container.active {
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: #374151;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #f8fafc;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            color: #1e1b4b;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 4px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .forgot-link {
            display: block;
            text-align: left;
            color: #6366f1;
            font-size: 13px;
            font-weight: 500;
            margin-top: 4px;
            cursor: pointer;
            background: none;
            border: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            margin-top: 12px;
            display: none;
        }

        .message.error {
            display: block;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            color: #b91c1c;
        }

        .message.success {
            display: block;
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.15);
            color: #15803d;
        }

        .message.info {
            display: block;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.15);
            color: #1d4ed8;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: #9ca3af;
            font-size: 14px;
        }

        .footer-text a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
        }

        .back-btn {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            background: transparent;
            color: #6b7280;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .back-btn:hover {
            border-color: #818cf8;
            color: #4f46e5;
        }

        .success-box {
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.15);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            color: #15803d;
            margin-top: 12px;
            display: none;
        }

        .success-box .icon {
            font-size: 32px;
            display: block;
            margin-bottom: 4px;
        }

        .success-box.show {
            display: block;
            animation: fadeUp 0.4s ease;
        }

        .reset-password-box {
            text-align: center;
            padding: 20px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 12px;
            margin-top: 12px;
        }

        .reset-password-box .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }

        .reset-password-box h3 {
            color: #1e1b4b;
            margin-bottom: 4px;
        }

        .reset-password-box p {
            color: #6b7280;
            font-size: 14px;
        }

        @media (max-width: 500px) {
            .auth-card {
                padding: 28px 16px;
            }
        }
    </style>
</head>
<body>

    <div class="auth-card" id="app">
        <div class="logo">ديف <span>أكاديمي</span></div>
        <p class="subtitle" id="pageSubtitle">سجل الدخول أو أنشئ حساباً</p>

        <!-- ===== TABS ===== -->
        <div class="tabs" id="mainTabs">
            <button class="tab-btn active" data-tab="login">🔐 تسجيل الدخول</button>
            <button class="tab-btn" data-tab="signup">📝 إنشاء حساب</button>
        </div>

        <!-- ===== تسجيل الدخول ===== -->
        <div class="form-container active" id="loginForm">
            <form id="loginFormElement">
                <div class="form-group">
                    <label>📧 البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" placeholder="example@email.com" required />
                </div>
                <div class="form-group">
                    <label>🔑 كلمة المرور</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required />
                </div>
                <button type="button" class="forgot-link" id="showResetBtn">نسيت كلمة المرور؟</button>
                <button type="submit" class="submit-btn" id="loginBtn">🚀 تسجيل الدخول</button>
            </form>
            <div class="message" id="loginMsg"></div>
        </div>

        <!-- ===== إنشاء حساب ===== -->
        <div class="form-container" id="signupForm">
            <form id="signupFormElement">
                <div class="form-group">
                    <label>👤 الاسم الكامل</label>
                    <input type="text" id="signupName" placeholder="أحمد محمد" required />
                </div>
                <div class="form-group">
                    <label>📧 البريد الإلكتروني</label>
                    <input type="email" id="signupEmail" placeholder="example@email.com" required />
                </div>
                <div class="form-group">
                    <label>🔑 كلمة المرور</label>
                    <input type="password" id="signupPassword" placeholder="•••••••• (٦ أحرف)" required minlength="6" />
                </div>
                <button type="submit" class="submit-btn" id="signupBtn">✨ إنشاء حساب</button>
            </form>
            <div class="message" id="signupMsg"></div>
        </div>

        <!-- ===== إعادة تعيين كلمة المرور ===== -->
        <div class="form-container" id="resetForm">
            <div style="text-align:center;margin-bottom:16px;">
                <span style="font-size:40px;">🔑</span>
                <h3 style="color:#1e1b4b;margin-top:4px;">إعادة تعيين كلمة المرور</h3>
                <p style="color:#6b7280;font-size:14px;">أدخل بريدك الإلكتروني وسنرسل لك رابطاً</p>
            </div>
            <form id="resetFormElement">
                <div class="form-group">
                    <label>📧 البريد الإلكتروني</label>
                    <input type="email" id="resetEmail" placeholder="example@email.com" required />
                </div>
                <button type="submit" class="submit-btn" id="resetBtn">📤 إرسال الرابط</button>
                <button type="button" class="back-btn" id="backToLogin">🔙 العودة</button>
            </form>
            <div class="message" id="resetMsg"></div>
            <div class="success-box" id="resetSuccessBox"></div>
        </div>

        <!-- ===== إعادة تعيين كلمة المرور (صفحة مخفية داخل نفس الصفحة) ===== -->
        <div class="form-container" id="resetPasswordForm">
            <div style="text-align:center;margin-bottom:16px;">
                <span style="font-size:40px;">🔑</span>
                <h3 style="color:#1e1b4b;margin-top:4px;">إعادة تعيين كلمة المرور</h3>
                <p style="color:#6b7280;font-size:14px;" id="resetPasswordSubtitle">أدخل كلمة المرور الجديدة</p>
            </div>
            
            <div id="resetPasswordStatus" style="text-align:center;padding:12px;background:rgba(99,102,241,0.06);border-radius:10px;margin-bottom:16px;color:#6366f1;">
                <span style="font-size:20px;display:block;">⏳</span>
                جارِ التحقق من الرابط...
            </div>

            <form id="resetPasswordFormElement" style="display:none;">
                <div class="form-group">
                    <label>🔑 كلمة المرور الجديدة</label>
                    <input type="password" id="newPassword" placeholder="•••••••• (٦ أحرف)" required minlength="6" />
                </div>
                <div class="form-group">
                    <label>✅ تأكيد كلمة المرور</label>
                    <input type="password" id="confirmNewPassword" placeholder="أعد كتابة كلمة المرور" required minlength="6" />
                </div>
                <button type="submit" class="submit-btn" id="resetPasswordBtn">✅ تأكيد</button>
                <a href="#" class="back-btn" style="display:block;text-align:center;text-decoration:none;margin-top:8px;" onclick="window.location.reload()">🔙 العودة</a>
            </form>
            <div class="message" id="resetPasswordMsg"></div>
        </div>

        <div class="footer-text" id="footerText">
            ليس لديك حساب؟ <a href="#" id="switchToSignup">أنشئ حساباً</a>
        </div>
    </div>

    <!-- ============================================================ -->
    <!--                     JAVASCRIPT                                 -->
    <!-- ============================================================ -->
    <script>
        // ===== إعدادات Supabase =====
        const SUPABASE_URL = 'https://mgcljgrkxhyjjmxqjkti.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_TE4fMQARKZb0XcjhAnEJhA_ws6AUxoi';

        let supabaseClient = null;
        if (window.supabase) {
            if (!window._supabaseClient) {
                window._supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
            supabaseClient = window._supabaseClient;
        }

        // ===== عناصر DOM =====
        const tabs = document.querySelectorAll('.tab-btn');
        const loginContainer = document.getElementById('loginForm');
        const signupContainer = document.getElementById('signupForm');
        const resetContainer = document.getElementById('resetForm');
        const resetPasswordContainer = document.getElementById('resetPasswordForm');
        const loginForm = document.getElementById('loginFormElement');
        const signupForm = document.getElementById('signupFormElement');
        const resetForm = document.getElementById('resetFormElement');
        const resetPasswordForm = document.getElementById('resetPasswordFormElement');
        const loginBtn = document.getElementById('loginBtn');
        const signupBtn = document.getElementById('signupBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resetPasswordBtn = document.getElementById('resetPasswordBtn');
        const loginMsg = document.getElementById('loginMsg');
        const signupMsg = document.getElementById('signupMsg');
        const resetMsg = document.getElementById('resetMsg');
        const resetPasswordMsg = document.getElementById('resetPasswordMsg');
        const resetSuccessBox = document.getElementById('resetSuccessBox');
        const resetPasswordStatus = document.getElementById('resetPasswordStatus');
        const footerText = document.getElementById('footerText');
        const showResetBtn = document.getElementById('showResetBtn');
        const backToLogin = document.getElementById('backToLogin');
        const pageSubtitle = document.getElementById('pageSubtitle');
        const mainTabs = document.getElementById('mainTabs');
        const newPassword = document.getElementById('newPassword');
        const confirmNewPassword = document.getElementById('confirmNewPassword');

        // ===== تبديل التبويبات =====
        function switchTab(tabId) {
            tabs.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabId));

            loginContainer.classList.toggle('active', tabId === 'login');
            signupContainer.classList.toggle('active', tabId === 'signup');
            resetContainer.classList.toggle('active', tabId === 'reset');
            resetPasswordContainer.classList.toggle('active', tabId === 'reset-password');

            mainTabs.style.display = (tabId === 'reset' || tabId === 'reset-password') ? 'none' : 'flex';
            pageSubtitle.textContent = tabId === 'reset' ? 'أدخل بريدك لإعادة تعيين كلمة المرور' :
                tabId === 'reset-password' ? 'أدخل كلمة المرور الجديدة' :
                'سجل الدخول أو أنشئ حساباً';

            // مسح الرسائل
            [loginMsg, signupMsg, resetMsg, resetPasswordMsg].forEach(el => {
                el.className = 'message';
                el.textContent = '';
            });

            if (tabId === 'login') {
                footerText.innerHTML = 'ليس لديك حساب؟ <a href="#" id="switchToSignup">أنشئ حساباً</a>';
                document.getElementById('switchToSignup')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    switchTab('signup');
                });
            } else if (tabId === 'signup') {
                footerText.innerHTML = 'لديك حساب بالفعل؟ <a href="#" id="switchToLogin">سجل الدخول</a>';
                document.getElementById('switchToLogin')?.addEventListener('click', (e) => {
                    e.preventDefault();
                    switchTab('login');
                });
            } else {
                footerText.innerHTML = '';
            }
        }

        tabs.forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        // ===== عرض الرسائل =====
        function showMsg(element, message, type) {
            element.className = `message ${type}`;
            element.textContent = message;
        }

        function setLoading(btn, loading) {
            btn.disabled = loading;
            btn.textContent = loading ? '⏳ جارٍ...' : btn.textContent;
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // ===== التحقق من جلسة المستخدم =====
        (async function checkSession() {
            try {
                if (!supabaseClient) return;
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session?.user) {
                    localStorage.setItem('devAcademicUser', JSON.stringify({
                        email: session.user.email,
                        name: session.user.user_metadata?.full_name || null
                    }));
                    window.location.href = 'dashboard.html';
                }
            } catch (_) {}
        })();

        // ===== تسجيل الدخول =====
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) { showMsg(loginMsg, 'يرجى ملء جميع الحقول.', 'error'); return; }
            if (!isValidEmail(email)) { showMsg(loginMsg, 'البريد الإلكتروني غير صحيح.', 'error'); return; }
            if (password.length < 6) { showMsg(loginMsg, 'كلمة المرور يجب أن تكون ٦ أحرف.', 'error'); return; }

            setLoading(loginBtn, true);

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                if (data?.user) {
                    localStorage.setItem('devAcademicUser', JSON.stringify({ email, name: data.user.user_metadata?.full_name || null }));
                    showMsg(loginMsg, '✅ تم تسجيل الدخول بنجاح!', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 800);
                }
            } catch (err) {
                if (err.message.includes('Invalid login credentials')) {
                    showMsg(loginMsg, '❌ البريد أو كلمة المرور غير صحيحة.', 'error');
                } else {
                    showMsg(loginMsg, `❌ ${err.message}`, 'error');
                }
            } finally {
                setLoading(loginBtn, false);
                loginBtn.textContent = '🚀 تسجيل الدخول';
            }
        });

        // ===== إنشاء حساب =====
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;

            if (!name || !email || !password) { showMsg(signupMsg, 'يرجى ملء جميع الحقول.', 'error'); return; }
            if (name.length < 2) { showMsg(signupMsg, 'الاسم يجب أن يكون حرفين على الأقل.', 'error'); return; }
            if (!isValidEmail(email)) { showMsg(signupMsg, 'البريد الإلكتروني غير صحيح.', 'error'); return; }
            if (password.length < 6) { showMsg(signupMsg, 'كلمة المرور يجب أن تكون ٦ أحرف.', 'error'); return; }

            setLoading(signupBtn, true);

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: { data: { full_name: name } }
                });
                if (error) throw error;
                if (data?.user) {
                    localStorage.setItem('devAcademicUser', JSON.stringify({ email, name }));
                    showMsg(signupMsg, '✅ تم إنشاء الحساب! يرجى تأكيد بريدك الإلكتروني.', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                }
            } catch (err) {
                if (err.message.includes('User already registered')) {
                    showMsg(signupMsg, '⚠️ هذا البريد مسجل بالفعل.', 'error');
                } else {
                    showMsg(signupMsg, `❌ ${err.message}`, 'error');
                }
            } finally {
                setLoading(signupBtn, false);
                signupBtn.textContent = '✨ إنشاء حساب';
            }
        });

        // ===== إظهار/إخفاء نافذة إعادة التعيين =====
        showResetBtn.addEventListener('click', () => switchTab('reset'));
        backToLogin.addEventListener('click', () => switchTab('login'));

        // ===== إرسال رابط إعادة التعيين =====
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value.trim();

            if (!email) { showMsg(resetMsg, 'يرجى إدخال البريد الإلكتروني.', 'error'); return; }
            if (!isValidEmail(email)) { showMsg(resetMsg, 'البريد الإلكتروني غير صحيح.', 'error'); return; }

            setLoading(resetBtn, true);

            try {
                // ===== الحل السهل: استخدام الرابط الحالي مع معامل reset =====
                const resetUrl = window.location.href.split('?')[0].split('#')[0] + '?reset=true';
                
                const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: resetUrl,
                });
                
                if (error) throw error;

                // عرض رسالة نجاح
                resetSuccessBox.className = 'success-box show';
                resetSuccessBox.innerHTML = `
                    <span class="icon">📧</span>
                    <p>✅ تم إرسال رابط إعادة التعيين إلى بريدك الإلكتروني</p>
                    <p style="font-size:13px;color:#6b7280;margin-top:4px;">⏱️ الرابط صالح لمدة 24 ساعة</p>
                `;
                showMsg(resetMsg, '✅ تم الإرسال بنجاح!', 'success');
                document.getElementById('resetEmail').value = '';

                // العودة بعد 5 ثواني
                setTimeout(() => switchTab('login'), 5000);

            } catch (err) {
                if (err.message.includes('User not found')) {
                    showMsg(resetMsg, '⚠️ لا يوجد حساب بهذا البريد.', 'error');
                } else {
                    showMsg(resetMsg, `❌ ${err.message}`, 'error');
                }
            } finally {
                setLoading(resetBtn, false);
                resetBtn.textContent = '📤 إرسال الرابط';
            }
        });

        // ===== التحقق من الرابط وإعادة تعيين كلمة المرور (داخل نفس الصفحة) =====
        (async function checkResetLink() {
            const urlParams = new URLSearchParams(window.location.search);
            const resetMode = urlParams.get('reset');
            const hash = window.location.hash;

            // إذا كان هناك hash أو reset=true
            if (resetMode === 'true' || hash.includes('access_token')) {
                switchTab('reset-password');

                let access_token = null;
                let refresh_token = null;

                // محاولة استخراج التوكن من hash أو search
                if (hash) {
                    try {
                        const params = new URLSearchParams(hash.substring(1));
                        access_token = params.get('access_token');
                        refresh_token = params.get('refresh_token');
                    } catch (e) {}
                }

                if (!access_token) {
                    // محاولة من search
                    try {
                        const params = new URLSearchParams(window.location.search);
                        access_token = params.get('access_token');
                        refresh_token = params.get('refresh_token');
                    } catch (e) {}
                }

                if (!access_token || !refresh_token) {
                    resetPasswordStatus.innerHTML = `
                        <span style="font-size:20px;display:block;">❌</span>
                        رابط غير صحيح أو منتهي الصلاحية
                        <br><br>
                        <a href="#" onclick="window.location.reload()" style="color:#6366f1;font-weight:600;text-decoration:none;">🔙 العودة</a>
                    `;
                    return;
                }

                try {
                    // تعيين الجلسة
                    const { data, error } = await supabaseClient.auth.setSession({
                        access_token: access_token,
                        refresh_token: refresh_token
                    });

                    if (error) throw error;

                    if (data?.user) {
                        resetPasswordStatus.innerHTML = `
                            <span style="font-size:20px;display:block;">✅</span>
                            مرحباً ${data.user.user_metadata?.full_name || data.user.email}
                            <br>
                            <span style="font-size:13px;color:#6b7280;">أدخل كلمة المرور الجديدة</span>
                        `;
                        resetPasswordStatus.style.background = 'rgba(34,197,94,0.08)';
                        resetPasswordStatus.style.color = '#15803d';
                        document.getElementById('resetPasswordFormElement').style.display = 'block';
                        document.getElementById('resetPasswordSubtitle').textContent = 'مرحباً، أدخل كلمة المرور الجديدة';
                    }
                } catch (err) {
                    resetPasswordStatus.innerHTML = `
                        <span style="font-size:20px;display:block;">❌</span>
                        ${err.message || 'حدث خطأ'}
                        <br><br>
                        <a href="#" onclick="window.location.reload()" style="color:#6366f1;font-weight:600;text-decoration:none;">🔙 العودة</a>
                    `;
                    resetPasswordStatus.style.background = 'rgba(239,68,68,0.08)';
                    resetPasswordStatus.style.color = '#b91c1c';
                }
            }
        })();

        // ===== إعادة تعيين كلمة المرور =====
        resetPasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = newPassword.value;
            const confirm = confirmNewPassword.value;

            if (!password || password.length < 6) {
                showMsg(resetPasswordMsg, 'كلمة المرور يجب أن تكون ٦ أحرف.', 'error');
                return;
            }
            if (password !== confirm) {
                showMsg(resetPasswordMsg, 'كلمتا المرور غير متطابقتين.', 'error');
                return;
            }

            setLoading(resetPasswordBtn, true);

            try {
                const { data, error } = await supabaseClient.auth.updateUser({
                    password: password
                });

                if (error) throw error;

                if (data?.user) {
                    showMsg(resetPasswordMsg, '✅ تم إعادة تعيين كلمة المرور بنجاح!', 'success');
                    document.getElementById('resetPasswordFormElement').style.display = 'none';
                    resetPasswordStatus.innerHTML = `
                        <span style="font-size:30px;display:block;">🎉</span>
                        تم تغيير كلمة المرور بنجاح!
                        <br>
                        <span style="font-size:13px;color:#6b7280;">سيتم توجيهك لتسجيل الدخول...</span>
                    `;
                    resetPasswordStatus.style.background = 'rgba(34,197,94,0.08)';
                    resetPasswordStatus.style.color = '#15803d';

                    setTimeout(() => {
                        window.location.href = window.location.href.split('?')[0];
                    }, 3000);
                }
            } catch (err) {
                showMsg(resetPasswordMsg, `❌ ${err.message}`, 'error');
            } finally {
                setLoading(resetPasswordBtn, false);
                resetPasswordBtn.textContent = '✅ تأكيد';
            }
        });

        // ===== التبديل الافتراضي =====
        switchTab('login');

        console.log('✅ صفحة تسجيل الدخول جاهزة');
        console.log('🔑 ميزة إعادة تعيين كلمة المرور تعمل داخل نفس الصفحة');
        console.log('📱 يعمل على جميع الأجهزة - لا حاجة لصفحة إضافية');
    </script>

</body>
</html>
