<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎓 ديف أكاديمي - لوحة التحكم</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        /* ============================================================
           لوحة التحكم الرئيسية - تصميم احترافي
           ============================================================ */
        
        :root {
            --primary: #0EA5E9;
            --primary-dark: #0284C7;
            --primary-gradient: linear-gradient(135deg, #0EA5E9, #38BDF8, #7DD3FC);
            --secondary: #8B5CF6;
            --success: #22C55E;
            --warning: #F59E0B;
            --danger: #EF4444;
            --bg: #F0F9FF;
            --bg-card: #FFFFFF;
            --text: #0C4A6E;
            --text-light: #64748B;
            --border: #BAE6FD;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 50px rgba(0,0,0,0.1);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-top: 72px;
            padding-bottom: 70px;
        }

        /* ============================================================
           NAVBAR
           ============================================================ */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(16px);
            padding: 0.5rem 1.5rem;
            border-bottom: 2px solid var(--border);
            box-shadow: 0 2px 30px rgba(14,165,233,0.08);
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .logo .logo-text {
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--primary);
        }
        .logo .logo-text span { color: var(--text); }
        .nav-search {
            display: flex;
            align-items: center;
            background: var(--bg);
            border-radius: 50px;
            padding: 0.15rem 0.15rem 0.15rem 1rem;
            border: 2px solid transparent;
            transition: var(--transition);
            flex: 1;
            max-width: 300px;
        }
        .nav-search:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(14,165,233,0.1);
        }
        .nav-search input {
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 0.85rem;
            padding: 0.4rem 0;
            width: 100%;
            font-family: inherit;
        }
        .nav-search input::placeholder { color: var(--text-light); }
        .nav-search button {
            background: var(--primary-gradient);
            border: none;
            color: white;
            padding: 0.35rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
        }
        .nav-search button:hover { transform: scale(1.05); }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .user-profile-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 50px;
            padding: 0.15rem 0.8rem 0.15rem 0.15rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .user-profile-btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .user-profile-btn .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--primary-gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
        }
        .user-profile-btn .user-name {
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .theme-toggle {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 1.1rem;
        }
        .theme-toggle:hover {
            border-color: var(--primary);
            transform: scale(1.1);
        }

        /* ============================================================
           BREADCRUMB
           ============================================================ */
        .breadcrumb {
            background: var(--bg-card);
            padding: 0.6rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-light);
            flex-wrap: wrap;
        }
        .breadcrumb span { color: var(--text); font-weight: 600; }
        .breadcrumb .separator { color: var(--border); }

        /* ============================================================
           MAIN CONTENT
           ============================================================ */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 1rem 100px;
        }

        /* ===== PAGE HEADER ===== */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .page-header h2 {
            font-size: 1.6rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .page-header h2 i { color: var(--primary); }
        .page-header .header-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .btn-primary {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 50px;
            background: var(--primary-gradient);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(14,165,233,0.3);
        }
        .btn-secondary {
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--border);
            border-radius: 50px;
            background: transparent;
            color: var(--text-light);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.85rem;
        }
        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .btn-admin {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 50px;
            background: var(--secondary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
        }
        .btn-admin:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(139,92,246,0.3);
        }
        .btn-logout {
            padding: 0.5rem 1.2rem;
            border: none;
            border-radius: 50px;
            background: var(--danger);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
        }
        .btn-logout:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(239,68,68,0.3);
        }

        /* ===== FILTER SECTION ===== */
        .filter-section {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 1rem 1.2rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }
        .filter-label {
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .filter-label i { color: var(--primary); }
        .filter-result {
            font-size: 0.8rem;
            color: var(--text-light);
            background: var(--bg);
            padding: 0.15rem 0.8rem;
            border-radius: 20px;
            font-weight: 600;
        }
        .filter-result span { color: var(--primary); }
        .filter-buttons {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.25rem 0.9rem;
            border-radius: 30px;
            border: 2px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
        }
        .filter-btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .filter-btn.active {
            background: var(--primary-gradient);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(14,165,233,0.3);
        }
        .filter-btn .btn-count {
            background: rgba(255,255,255,0.2);
            padding: 0.02rem 0.4rem;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 700;
        }
        .filter-btn.active .btn-count { background: rgba(255,255,255,0.25); }

        /* ===== CARDS GRID ===== */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.2rem;
        }

        /* ===== TEACHER CARD ===== */
        .teacher-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid var(--border);
            box-shadow: var(--shadow);
            padding: 1.2rem 1rem;
            text-align: center;
            position: relative;
        }
        .teacher-card:hover {
            transform: translateY(-6px);
            border-color: var(--primary);
            box-shadow: var(--shadow-lg);
        }
        .teacher-card .teacher-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            margin: 0 auto 0.6rem;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: white;
            border: 3px solid var(--primary);
            transition: var(--transition);
            overflow: hidden;
        }
        .teacher-card:hover .teacher-avatar {
            transform: scale(1.08);
            border-color: var(--secondary);
        }
        .teacher-card .teacher-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .teacher-card .teacher-name {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.05rem;
        }
        .teacher-card .teacher-subject {
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 500;
        }
        .teacher-card .teacher-meta {
            font-size: 0.7rem;
            color: var(--text-light);
            margin-top: 0.2rem;
        }
        .teacher-card .teacher-badge {
            position: absolute;
            top: 0.6rem;
            right: 0.6rem;
            background: var(--success);
            color: white;
            padding: 0.1rem 0.6rem;
            border-radius: 20px;
            font-size: 0.55rem;
            font-weight: 700;
        }
        .teacher-card .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--bg);
            border-radius: 2px;
            margin-top: 0.6rem;
            overflow: hidden;
        }
        .teacher-card .progress-bar .progress-fill {
            height: 100%;
            background: var(--primary-gradient);
            border-radius: 2px;
            transition: width 0.6s ease;
        }
        .teacher-card .progress-text {
            font-size: 0.6rem;
            color: var(--text-light);
            margin-top: 0.15rem;
        }

        /* ============================================================
           MODALS
           ============================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.8rem;
            max-width: 100%;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            position: relative;
            animation: modalIn 0.3s ease;
            border: 1px solid var(--border);
        }
        @keyframes modalIn {
            from { transform: scale(0.95) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        .modal-large { max-width: 680px; }
        .modal .close-btn {
            position: sticky;
            top: 0;
            float: left;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: var(--text-light);
            cursor: pointer;
            transition: var(--transition);
            padding: 0.2rem 0.5rem;
        }
        .modal .close-btn:hover {
            color: var(--danger);
            transform: rotate(90deg);
        }
        .modal h2 {
            text-align: center;
            color: var(--primary);
            font-size: 1.3rem;
            margin-bottom: 0.3rem;
        }
        .modal .modal-subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
        }

        /* ===== STUDENT ITEM ===== */
        .student-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.7rem 1rem;
            background: var(--bg);
            border-radius: var(--radius);
            margin-bottom: 0.5rem;
            border: 2px solid transparent;
            transition: var(--transition);
            cursor: pointer;
        }
        .student-item:hover {
            border-color: var(--primary);
            transform: translateX(-4px);
            box-shadow: var(--shadow);
        }
        .student-item .student-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .student-item .student-info { flex: 1; min-width: 0; }
        .student-item .student-name { font-weight: 700; font-size: 0.9rem; }
        .student-item .student-email { font-size: 0.7rem; color: var(--text-light); }
        .student-item .student-progress { text-align: left; }
        .student-item .student-progress .progress-number {
            font-weight: 700;
            font-size: 1rem;
            color: var(--primary);
        }
        .student-item .student-progress .progress-label {
            font-size: 0.55rem;
            color: var(--text-light);
        }

        /* ============================================================
           BOTTOM NAV
           ============================================================ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-top: 2px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0.3rem 0;
            z-index: 999;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.05rem;
            padding: 0.2rem 0.6rem;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-light);
            font-size: 0.55rem;
            min-width: 50px;
            border: none;
            background: none;
            position: relative;
        }
        .bottom-nav .nav-item i { font-size: 1.2rem; }
        .bottom-nav .nav-item.active { color: var(--primary); }
        .bottom-nav .nav-item .badge {
            background: var(--danger);
            color: white;
            border-radius: 50%;
            padding: 0.05rem 0.35rem;
            font-size: 0.45rem;
            position: absolute;
            top: -2px;
            right: -4px;
            min-width: 16px;
            text-align: center;
        }

        /* ============================================================
           TOAST
           ============================================================ */
        .toast-container {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: center;
            width: 90%;
            max-width: 400px;
            pointer-events: none;
        }
        .toast {
            padding: 0.7rem 1.2rem;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            animation: slideUp 0.4s ease;
            width: 100%;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            pointer-events: auto;
            text-align: center;
        }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.info { background: var(--primary-gradient); }
        .toast.warning { background: var(--warning); color: #1E293B; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ============================================================
           EMPTY STATE
           ============================================================ */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-light);
            grid-column: 1 / -1;
        }
        .empty-state .empty-icon {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 0.5rem;
            opacity: 0.5;
        }
        .empty-state h3 {
            font-size: 1.2rem;
            color: var(--text);
            margin-bottom: 0.2rem;
        }
        .empty-state p { font-size: 0.9rem; }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 768px) {
            .nav-search { max-width: 150px; }
            .nav-search input { font-size: 0.75rem; }
            .nav-search button { padding: 0.25rem 0.6rem; font-size: 0.7rem; }
            .user-profile-btn .user-name { max-width: 60px; font-size: 0.75rem; }
            .user-profile-btn .avatar { width: 28px; height: 28px; font-size: 0.7rem; }
            .theme-toggle { width: 34px; height: 34px; font-size: 0.9rem; }
            .cards-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.8rem; }
            .page-header h2 { font-size: 1.2rem; }
            .teacher-card .teacher-avatar { width: 56px; height: 56px; font-size: 1.6rem; }
            .filter-btn { font-size: 0.65rem; padding: 0.15rem 0.6rem; }
        }
        @media (max-width: 480px) {
            .cards-grid { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
            .teacher-card { padding: 0.8rem 0.5rem; }
            .teacher-card .teacher-avatar { width: 44px; height: 44px; font-size: 1.2rem; }
            .teacher-card .teacher-name { font-size: 0.8rem; }
            .teacher-card .teacher-subject { font-size: 0.65rem; }
            .modal { padding: 1rem; }
            .student-item { padding: 0.4rem 0.6rem; }
            .student-item .student-avatar { width: 32px; height: 32px; font-size: 0.8rem; }
            .bottom-nav .nav-item { font-size: 0.45rem; min-width: 40px; }
            .bottom-nav .nav-item i { font-size: 1rem; }
            .filter-btn { font-size: 0.55rem; padding: 0.1rem 0.4rem; }
            .filter-label { font-size: 0.8rem; }
            .nav-search { max-width: 100px; }
            .nav-search input { width: 50px; }
            .btn-logout { font-size: 0.7rem; padding: 0.3rem 0.8rem; }
        }

        /* ============================================================
           DARK MODE
           ============================================================ */
        body.dark-mode {
            --bg: #0F172A;
            --bg-card: #1E293B;
            --text: #F1F5F9;
            --text-light: #94A3B8;
            --border: #1E3A5F;
        }
        body.dark-mode .navbar { background: rgba(15,23,42,0.92); }
        body.dark-mode .bottom-nav { background: rgba(30,41,59,0.95); }
    </style>
</head>
<body>
    <!-- ===== NAVBAR ===== -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">🎓 ديف <span>أكاديمي</span></span>
            </div>
            <div class="nav-search">
                <input type="text" id="searchInput" placeholder="🔍 بحث عن مدرس..." />
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
            <div class="nav-right">
                <div class="user-profile-btn" id="userProfileBtn">
                    <span class="avatar" id="userAvatar">👤</span>
                    <span class="user-name" id="userNameDisplay">ضيف</span>
                </div>
                <button class="btn-logout" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- ===== BREADCRUMB ===== -->
    <div class="breadcrumb">
        <i class="fas fa-home" style="color:var(--primary);"></i>
        <span id="breadcrumbText">المدرسين</span>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-container">
        <!-- ===== PAGE TEACHERS ===== -->
        <div id="page-teachers" style="display:block;">
            <div class="page-header">
                <h2><i class="fas fa-chalkboard-teacher"></i> <span id="pageTitle">المدرسين</span></h2>
                <div class="header-actions">
                    <button class="btn-admin" id="adminPanelBtn" style="display:none;" onclick="openAdminPanel()">
                        <i class="fas fa-cog"></i> الإدارة
                    </button>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-header">
                    <div class="filter-label">
                        <i class="fas fa-filter"></i> تصفية حسب الصف
                    </div>
                    <div class="filter-result">
                        🧑‍🏫 <span id="teachersCount">0</span> مدرس
                    </div>
                </div>
                <div class="filter-buttons" id="gradeFilter"></div>
            </div>

            <div class="cards-grid" id="teachersGrid"></div>
        </div>

        <!-- ===== PAGE MY CLASSES ===== -->
        <div id="page-my-classes" style="display:none;">
            <div class="page-header">
                <h2><i class="fas fa-book-open"></i> فصولي الدراسية</h2>
            </div>
            <div class="cards-grid" id="myClassesGrid"></div>
        </div>
    </div>

    <!-- ===== BOTTOM NAV ===== -->
    <nav class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-page="teachers">
            <i class="fas fa-chalkboard-teacher"></i>
            <span>المدرسون</span>
        </button>
        <button class="nav-item" data-page="my-classes">
            <i class="fas fa-book-open"></i>
            <span>فصولي</span>
            <span class="badge" id="classesBadge" style="display:none;">0</span>
        </button>
        <button class="nav-item" data-page="account">
            <i class="fas fa-user"></i>
            <span>حسابي</span>
        </button>
    </nav>

    <!-- ===== MODALS ===== -->
    
    <!-- فصول المدرس -->
    <div class="modal-overlay" id="teacherClassesModal">
        <div class="modal modal-large">
            <button class="close-btn" id="closeTeacherClasses"><i class="fas fa-times"></i></button>
            <h2 id="teacherClassesTitle">👨‍🏫 المدرس</h2>
            <p class="modal-subtitle" id="teacherClassesSubtitle">اختر الفصل لعرض الطلاب</p>
            <div id="teacherClassesList"></div>
        </div>
    </div>

    <!-- طلاب الفصل -->
    <div class="modal-overlay" id="classStudentsModal">
        <div class="modal modal-large">
            <button class="close-btn" id="closeClassStudents"><i class="fas fa-times"></i></button>
            <h2 id="classStudentsTitle">📚 الفصل</h2>
            <p class="modal-subtitle" id="classStudentsSubtitle">قائمة الطلاب المسجلين</p>
            <div id="classStudentsList"></div>
        </div>
    </div>

    <!-- تقدم الطالب (للمشرف فقط) -->
    <div class="modal-overlay" id="studentProgressModal">
        <div class="modal modal-large">
            <button class="close-btn" id="closeStudentProgress"><i class="fas fa-times"></i></button>
            <h2 id="studentProgressTitle">📊 تقدم الطالب</h2>
            <div id="studentProgressContent"></div>
        </div>
    </div>

    <!-- ===== ADMIN PANEL ===== -->
    <div class="modal-overlay" id="adminPanel">
        <div class="modal modal-large" style="max-width:800px;">
            <button class="close-btn" onclick="closeAdminPanel()"><i class="fas fa-times"></i></button>
            <h2><i class="fas fa-cog"></i> لوحة الإدارة</h2>
            <p class="modal-subtitle">📊 إحصائيات المنصة وتقدم الطلاب</p>
            
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0.8rem;margin-bottom:1.5rem;">
                <div class="stat-card" style="background:var(--bg);padding:1rem;border-radius:12px;text-align:center;border:1px solid var(--border);">
                    <div style="font-size:2rem;font-weight:900;color:var(--primary);" id="totalStudents">0</div>
                    <div style="font-size:0.7rem;color:var(--text-light);">👨‍🎓 الطلاب</div>
                </div>
                <div class="stat-card" style="background:var(--bg);padding:1rem;border-radius:12px;text-align:center;border:1px solid var(--border);">
                    <div style="font-size:2rem;font-weight:900;color:var(--primary);" id="totalTeachers">0</div>
                    <div style="font-size:0.7rem;color:var(--text-light);">👨‍🏫 المدرسين</div>
                </div>
                <div class="stat-card" style="background:var(--bg);padding:1rem;border-radius:12px;text-align:center;border:1px solid var(--border);">
                    <div style="font-size:2rem;font-weight:900;color:var(--primary);" id="totalClasses">0</div>
                    <div style="font-size:0.7rem;color:var(--text-light);">📚 الفصول</div>
                </div>
                <div class="stat-card" style="background:var(--bg);padding:1rem;border-radius:12px;text-align:center;border:1px solid var(--border);">
                    <div style="font-size:2rem;font-weight:900;color:var(--primary);" id="totalLectures">0</div>
                    <div style="font-size:0.7rem;color:var(--text-light);">🎥 المحاضرات</div>
                </div>
            </div>

            <h3 style="margin-bottom:0.5rem;font-size:1rem;">👨‍🎓 تقدم الطلاب</h3>
            <div id="studentsProgressList" style="max-height:400px;overflow-y:auto;"></div>
        </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="script.js"></script>
</body>
</html>
