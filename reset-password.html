<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إعادة تعيين كلمة المرور</title>

    <!-- ===== Supabase SDK ===== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #f0f4ff 0%, #e8edf8 100%);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .bg-shapes .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: floatShape 20s ease-in-out infinite alternate;
        }

        .bg-shapes .shape:nth-child(1) {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #818cf8, #6366f1);
            top: -150px;
            right: -150px;
            animation-duration: 25s;
            animation-delay: 0s;
        }

        .bg-shapes .shape:nth-child(2) {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            bottom: -100px;
            left: -100px;
            animation-duration: 20s;
            animation-delay: 3s;
        }

        @keyframes floatShape {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            33% {
                transform: translate(30px, -40px) scale(1.05) rotate(5deg);
            }
            66% {
                transform: translate(-20px, 30px) scale(0.95) rotate(-3deg);
            }
            100% {
                transform: translate(15px, -15px) scale(1.02) rotate(2deg);
            }
        }

        .reset-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 44px 36px 38px;
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.12), 0 8px 24px rgba(0, 0, 0, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.4);
            animation: cardAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform: translateY(30px);
            opacity: 0;
        }

        @keyframes cardAppear {
            0% {
                transform: translateY(30px) scale(0.96);
                opacity: 0;
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .reset-card .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #fff;
            margin: 0 auto 12px;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
        }

        .reset-card h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            color: #1e1b4b;
            margin-bottom: 4px;
        }

        .reset-card .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            font-weight: 400;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 18px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: #374151;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .form-group label .required {
            color: #ef4444;
            margin-right: 2px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: #f8fafc;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            color: #1e1b4b;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .form-group input::placeholder {
            color: #b0b8c4;
            font-weight: 400;
        }

        .form-group input:focus {
            border-color: #818cf8;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            transform: translateY(-1px);
        }

        .form-group input.error {
            border-color: #ef4444;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
        }

        .form-group .password-strength {
            font-size: 12px;
            margin-top: 4px;
            color: #6b7280;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-top: 4px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.6s ease;
        }

        .submit-btn:hover:not(:disabled)::before {
            left: 100%;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.35);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .submit-btn .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        .submit-btn.loading .spinner {
            display: block;
        }
        .submit-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .message {
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            margin-top: 16px;
            display: none;
            align-items: center;
            gap: 10px;
            animation: slideFade 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .message .msg-icon {
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.error {
            display: flex;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            color: #b91c1c;
        }

        .message.success {
            display: flex;
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.15);
            color: #15803d;
        }

        .message.info {
            display: flex;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.15);
            color: #1d4ed8;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #4f46e5;
            text-decoration: underline;
        }

        .status-badge {
            text-align: center;
            padding: 12px;
            background: rgba(99, 102, 241, 0.08);
            border-radius: 12px;
            color: #6366f1;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .status-badge .icon {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
        }

        @keyframes slideFade {
            0% {
                opacity: 0;
                transform: translateY(12px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 520px) {
            .reset-card {
                padding: 28px 20px 24px;
                border-radius: 24px;
            }
            .reset-card h1 {
                font-size: 20px;
            }
            .form-group input {
                padding: 12px 16px;
                font-size: 14px;
            }
            .submit-btn {
                padding: 14px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="reset-card" id="resetCard">
        <div class="logo-icon">🔑</div>
        <h1>إعادة تعيين كلمة المرور</h1>
        <p class="subtitle" id="pageSubtitle">أدخل كلمة المرور الجديدة</p>

        <div id="statusBadge" class="status-badge">
            <span class="icon">📧</span>
            جارِ التحقق من الرابط...
        </div>

        <form id="resetFormElement" novalidate style="display:none;">
            <div class="form-group">
                <label for="newPassword">🔑 كلمة المرور الجديدة <span class="required">*</span></label>
                <input type="password" id="newPassword" placeholder="•••••••• (٦ أحرف على الأقل)" required minlength="6" />
                <div class="password-strength" id="passwordStrength">يجب أن تكون ٦ أحرف على الأقل</div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">✅ تأكيد كلمة المرور <span class="required">*</span></label>
                <input type="password" id="confirmPassword" placeholder="أعد كتابة كلمة المرور" required minlength="6" />
            </div>
            <button type="submit" class="submit-btn" id="resetBtn">
                <span class="btn-text">✅ تأكيد إعادة التعيين</span>
                <span class="spinner"></span>
            </button>
        </form>

        <div class="message" id="resetMessage"></div>

        <a href="index.html" class="back-link">🔙 العودة إلى تسجيل الدخول</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://mgcljgrkxhyjjmxqjkti.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_TE4fMQARKZb0XcjhAnEJhA_ws6AUxoi';

        let supabaseClient = null;
        if (window.supabase) {
            if (!window._supabaseClient) {
                window._supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
            supabaseClient = window._supabaseClient;
        }

        const form = document.getElementById('resetFormElement');
        const statusBadge = document.getElementById('statusBadge');
        const pageSubtitle = document.getElementById('pageSubtitle');
        const resetBtn = document.getElementById('resetBtn');
        const resetMsg = document.getElementById('resetMessage');
        const newPassword = document.getElementById('newPassword');
        const confirmPassword = document.getElementById('confirmPassword');

        let accessToken = null;
        let refreshToken = null;

        // ===== استخراج التوكن من الرابط =====
        function getTokensFromURL() {
            const hash = window.location.hash;
            if (!hash) return null;

            try {
                const params = new URLSearchParams(hash.substring(1));
                const access_token = params.get('access_token');
                const refresh_token = params.get('refresh_token');
                const type = params.get('type');

                if (access_token && refresh_token && type === 'recovery') {
                    return { access_token, refresh_token };
                }
                return null;
            } catch (e) {
                console.error('Error parsing URL:', e);
                return null;
            }
        }

        // ===== التحقق من صحة الرابط =====
        async function verifyResetLink() {
            const tokens = getTokensFromURL();

            if (!tokens) {
                statusBadge.innerHTML = `
                    <span class="icon">❌</span>
                    رابط إعادة التعيين غير صحيح أو منتهي الصلاحية.
                    <br>
                    <span style="font-size:12px;color:#6b7280;">يرجى طلب رابط جديد من صفحة تسجيل الدخول.</span>
                `;
                statusBadge.style.background = 'rgba(239, 68, 68, 0.08)';
                statusBadge.style.color = '#b91c1c';
                return false;
            }

            accessToken = tokens.access_token;
            refreshToken = tokens.refresh_token;

            try {
                // محاولة تعيين الجلسة باستخدام التوكن
                const { data, error } = await supabaseClient.auth.setSession({
                    access_token: accessToken,
                    refresh_token: refreshToken
                });

                if (error) throw error;

                if (data?.user) {
                    statusBadge.innerHTML = `
                        <span class="icon">✅</span>
                        تم التحقق من هويتك بنجاح!
                        <br>
                        <span style="font-size:12px;color:#6b7280;">يمكنك الآن إعادة تعيين كلمة المرور.</span>
                    `;
                    statusBadge.style.background = 'rgba(34, 197, 94, 0.08)';
                    statusBadge.style.color = '#15803d';
                    form.style.display = 'block';
                    pageSubtitle.textContent = 'مرحباً ' + (data.user.user_metadata?.full_name || data.user.email);
                    return true;
                }

                return false;
            } catch (err) {
                console.error('Verification error:', err);
                statusBadge.innerHTML = `
                    <span class="icon">❌</span>
                    ${err.message || 'حدث خطأ في التحقق من الرابط.'}
                    <br>
                    <span style="font-size:12px;color:#6b7280;">يرجى طلب رابط جديد من صفحة تسجيل الدخول.</span>
                `;
                statusBadge.style.background = 'rgba(239, 68, 68, 0.08)';
                statusBadge.style.color = '#b91c1c';
                return false;
            }
        }

        // ===== إعادة تعيين كلمة المرور =====
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            resetMsg.className = 'message';
            resetMsg.textContent = '';

            const password = newPassword.value;
            const confirm = confirmPassword.value;

            if (!password || password.length < 6) {
                showMessage(resetMsg, 'كلمة المرور يجب أن تكون ٦ أحرف على الأقل.', 'error');
                return;
            }

            if (password !== confirm) {
                showMessage(resetMsg, 'كلمتا المرور غير متطابقتين.', 'error');
                return;
            }

            setLoading(resetBtn, true);

            try {
                // تحديث كلمة المرور باستخدام التوكن المخزن
                const { data, error } = await supabaseClient.auth.updateUser({
                    password: password
                });

                if (error) throw error;

                if (data?.user) {
                    showMessage(resetMsg, '✅ تم إعادة تعيين كلمة المرور بنجاح!', 'success');
                    form.style.display = 'none';
                    statusBadge.innerHTML = `
                        <span class="icon">🎉</span>
                        تم تغيير كلمة المرور بنجاح!
                        <br>
                        <span style="font-size:12px;color:#6b7280;">يمكنك الآن تسجيل الدخول باستخدام كلمة المرور الجديدة.</span>
                    `;
                    statusBadge.style.background = 'rgba(34, 197, 94, 0.08)';
                    statusBadge.style.color = '#15803d';
                    pageSubtitle.textContent = 'تم إعادة التعيين بنجاح ✅';

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                }
            } catch (err) {
                console.error('Reset error:', err);
                if (err.message.includes('Invalid token')) {
                    showMessage(resetMsg, '⚠️ الرابط منتهي الصلاحية. يرجى طلب رابط جديد.', 'error');
                } else {
                    showMessage(resetMsg, `❌ ${err.message || 'حدث خطأ، حاول مجدداً.'}`, 'error');
                }
            } finally {
                setLoading(resetBtn, false);
            }
        });

        // ===== عرض قوة كلمة المرور =====
        newPassword.addEventListener('input', function() {
            const strength = document.getElementById('passwordStrength');
            const val = this.value;

            if (val.length === 0) {
                strength.textContent = 'يجب أن تكون ٦ أحرف على الأقل';
                strength.style.color = '#6b7280';
                return;
            }

            if (val.length < 6) {
                strength.textContent = '⚠️ ضعيفة - يجب أن تكون ٦ أحرف على الأقل';
                strength.style.color = '#ef4444';
                return;
            }

            if (val.length >= 6 && val.length < 10) {
                strength.textContent = '🟡 متوسطة';
                strength.style.color = '#f59e0b';
                return;
            }

            if (val.length >= 10 && /[A-Z]/.test(val) && /[0-9]/.test(val)) {
                strength.textContent = '🟢 قوية';
                strength.style.color = '#22c55e';
                return;
            }

            strength.textContent = '🟡 جيدة';
            strength.style.color = '#f59e0b';
        });

        confirmPassword.addEventListener('input', function() {
            if (this.value.length > 0 && this.value !== newPassword.value) {
                this.style.borderColor = '#ef4444';
            } else {
                this.style.borderColor = '#e5e7eb';
            }
        });

        // ===== دوال مساعدة =====
        function showMessage(element, message, type) {
            const icons = { error: '❌', success: '✅', info: 'ℹ️' };
            element.className = `message ${type}`;
            element.innerHTML = `<span class="msg-icon">${icons[type] || '📌'}</span> ${message}`;
        }

        function setLoading(btn, loading) {
            if (loading) {
                btn.classList.add('loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }

        // ===== بدء التحقق =====
        verifyResetLink();
        console.log('🔑 صفحة إعادة تعيين كلمة المرور جاهزة');
    </sc
